<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWAP Detector — Hyperliquid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04030a;--bg2:#070510;--bg3:#0a0718;--border:rgba(30,80,140,0.4);--border2:#244060;--text:#c8d8e8;--text2:#6a8aaa;--text3:#3a5070;--up:#00ffaa;--down:#ff2255;--mono:'JetBrains Mono',monospace;--sans:'Rajdhani',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden}
.wrap{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(4,6,12,0.9);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--sans);font-weight:700;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#26a69a;box-shadow:0 0 6px #26a69a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ws-badges{display:flex;gap:6px;align-items:center}
.ws-badge{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--text3);color:var(--text3)}
.ws-badge.live{border-color:#26a69a;color:#26a69a}
.clock{font-size:11px;color:var(--text3)}
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(4,5,10,0.6);flex-shrink:0}
.tab{padding:6px 14px;font-size:11px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:#26a69a}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.active{display:flex}
.filter-wrap{padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(4,5,10,0.4)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:5px}
.filter-row:last-child{margin-bottom:0}
.glabel{font-size:9px;color:var(--text3);min-width:62px;text-transform:uppercase;letter-spacing:.5px}
.cbtn{background:rgba(10,20,40,0.5);border:1px solid var(--text3);color:var(--text3);border-radius:3px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.cbtn.on{background:rgba(38,166,154,0.1);border-color:#26a69a;color:#26a69a}
.faction{display:flex;gap:5px;margin-top:6px}
.fa{background:transparent;border:1px solid var(--text3);color:var(--text3);border-radius:3px;padding:2px 9px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.fa:hover{border-color:#26a69a;color:#26a69a}
.fa.apply{border-color:rgba(38,166,154,0.5);color:#26a69a}
.main-content{flex:1;overflow-y:auto;padding:0}
.twap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;padding:8px;align-content:start}
.twap-card{background:rgba(4,7,12,0.8);border:1px solid rgba(30,80,120,0.3);border-radius:6px;padding:10px 12px;min-width:0}
.twap-card.buy{border-left:3px solid #26a69a}
.twap-card.sell{border-left:3px solid #ff2255}
.twap-card.inactive{opacity:.5}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-side{display:flex;align-items:center;gap:7px}
.side-dot{width:7px;height:7px;border-radius:50%}
.side-dot.buy{background:#26a69a}
.side-dot.sell{background:#ff2255}
.side-label{font-family:var(--sans);font-weight:700;font-size:14px}
.side-label.buy{color:#26a69a}
.side-label.sell{color:#ff2255}
.coin-tag{font-size:10px;color:var(--text3)}
.card-wallet{font-size:10px;color:var(--text3);margin-bottom:8px;cursor:pointer;font-family:var(--mono);text-decoration:none;display:block}
.card-wallet:hover{color:var(--text2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.stat-box{background:var(--bg2);border-radius:3px;padding:5px 7px}
.stat-label{font-size:9px;color:var(--text3)}
.stat-val{font-size:12px;color:var(--text);margin-top:1px}
.stat-val.up{color:#00ffaa}
.stat-val.buy{color:#26a69a}
.stat-val.sell{color:#ff2255}
.stat-box.full{grid-column:1/-1}
.timing-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:6px}
.timing-row span{color:#f59e0b}
.prog-wrap{background:rgba(10,20,40,0.4);border-radius:3px;height:4px}
.prog-fill{height:100%;border-radius:3px;background:#26a69a}
.prog-fill.sell{background:#ff2255}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:11px;gap:8px;text-align:center}
.log-wrap{flex:1;overflow-y:auto;padding:8px 12px}
.log-line{font-size:11px;line-height:1.8;white-space:pre-wrap;word-break:break-all}
.log-line.sys{color:var(--text3)}
.log-line.info{color:#26a69a}
.log-line.buy{color:#26a69a;font-weight:500}
.log-line.sell{color:#ff2255;font-weight:500}
.log-line.warn{color:#f59e0b}
.log-line.err{color:#ff2255}
.alert-bar{display:none;padding:5px 14px;font-size:11px;flex-shrink:0}
.alert-bar.buy{background:rgba(38,166,154,0.08);border-bottom:1px solid rgba(38,166,154,0.3);color:#26a69a}
.alert-bar.sell{background:rgba(255,34,85,0.08);border-bottom:1px solid rgba(255,34,85,0.3);color:#ff2255}
.alert-bar.show{display:block}
.bottombar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:rgba(7,5,16,.95);border-top:1px solid var(--border);font-size:10px;color:var(--text3);flex-shrink:0;flex-wrap:wrap;gap:4px}
.bcnt{color:var(--text2)}
.bcnt b{font-weight:500}
.bclear{background:transparent;border:1px solid var(--text3);color:var(--text3);border-radius:3px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.bclear:hover{border-color:#ff2255;color:#ff2255}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>TWAP Detector — Hyperliquid</div>
    <div class="ws-badges">
      <div class="ws-badge" id="ws1-badge">WS1 off</div>
      <div class="ws-badge" id="ws2-badge">WS2 off</div>
    </div>
    <div class="clock" id="clk">--:--:--</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-t="twap">⚡ TWAP Live</div>
    <div class="tab" data-t="log">Log</div>
    <div class="tab" data-t="filter">Filter Coin</div>
  </div>
  <div id="alert-bar" class="alert-bar buy"></div>
  <div class="panel active" id="panel-twap">
    <div class="main-content" id="twap-content">
      <div class="empty-state"><div style="font-size:28px">🔍</div><div>Menunggu TWAP...</div><div style="font-size:10px">Disconnect berkala dari server adalah normal — reconnect otomatis</div></div>
    </div>
  </div>
  <div class="panel" id="panel-log"><div class="log-wrap" id="log-out"></div></div>
  <div class="panel" id="panel-filter">
    <div class="filter-wrap">
      <div class="filter-row">
        <span class="glabel">Bot aktif</span>
        <button class="cbtn on" data-coin="@334" data-name="KNTQ">KNTQ</button>
        <button class="cbtn on" data-coin="PURR/USDC" data-name="PURR">PURR</button>
        <button class="cbtn on" data-coin="@1" data-name="HFUN">HFUN</button>
        <button class="cbtn on" data-coin="@59" data-name="CATBAL">CATBAL</button>
        <button class="cbtn on" data-coin="@240" data-name="KITTEN">KITTEN</button>
        <button class="cbtn on" data-coin="@130" data-name="BEATS">BEATS</button>
        <button class="cbtn on" data-coin="@160" data-name="BUDDY">BUDDY</button>
        <button class="cbtn on" data-coin="@107" data-name="HYPE">HYPE</button>
        <button class="cbtn on" data-coin="@242" data-name="SWAP">SWAP</button>
        <button class="cbtn on" data-coin="@85" data-name="PIP">PIP</button>
      </div>
      <div class="filter-row">
        <span class="glabel">Lainnya</span>
        <button class="cbtn on" data-coin="@5" data-name="JEFF">JEFF</button>
        <button class="cbtn on" data-coin="@184" data-name="HPENGU">HPENGU</button>
        <button class="cbtn on" data-coin="@188" data-name="UPUMP">UPUMP</button>
        <button class="cbtn on" data-coin="@261" data-name="HAR">HAR</button>
        <button class="cbtn on" data-coin="@162" data-name="UFART">UFART</button>
        <button class="cbtn on" data-coin="@335" data-name="HPL">HPL</button>
        <button class="cbtn on" data-coin="@206" data-name="UENA">UENA</button>
        <button class="cbtn on" data-coin="@284" data-name="QONE">QONE</button>
      </div>
      <div class="faction">
        <button class="fa" id="fa-all">pilih semua</button>
        <button class="fa" id="fa-none">hapus semua</button>
        <button class="fa apply" id="fa-apply">terapkan ✓</button>
      </div>
    </div>
  </div>
  <div class="bottombar">
    <span id="bs-conn" style="color:var(--text3)">● menghubungkan...</span>
    <span class="bcnt">TWAP: <b id="bs-twap" style="color:#f59e0b">0</b></span>
    <span class="bcnt">BUY: <b id="bs-buy" style="color:#26a69a">0</b></span>
    <span class="bcnt">SELL: <b id="bs-sell" style="color:#ff2255">0</b></span>
    <span class="bcnt">Monitor: <b id="bs-mon" style="color:#6a8aaa">0</b></span>
    <button class="bclear" id="bclear">clear log</button>
  </div>
</div>
<script>
// Coin map — HYPE pakai @107 (spot pair index yang benar)
const COINS={
  '@334':'KNTQ','PURR/USDC':'PURR','@1':'HFUN','@59':'CATBAL',
  '@240':'KITTEN','@130':'BEATS','@160':'BUDDY','@107':'HYPE',
  '@242':'SWAP','@85':'PIP','@5':'JEFF','@184':'HPENGU',
  '@188':'UPUMP','@261':'HAR','@162':'UFART','@335':'HPL',
  '@206':'UENA','@284':'QONE'
};

let active=new Set(Object.keys(COINS));
let alT=null,twapC=0,buyC=0,sellC=0;
const twapGroups={};
const seenTids=new Set();
const ZERO_HASH='0x'+'0'.repeat(64);

// Split ke 2 WebSocket — masing-masing 9 coin
const ALL=Object.keys(COINS);
const G1=ALL.slice(0,9);  // 9 coin
const G2=ALL.slice(9);    // 9 coin

function ts(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fmt(n){return Number(parseFloat(n)).toLocaleString('id-ID',{minimumFractionDigits:0,maximumFractionDigits:2});}
function fmtU(n){return Number(parseFloat(n)).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2});}
setInterval(()=>{document.getElementById('clk').textContent=ts();},1000);

function log(text,cls='sys'){
  const lo=document.getElementById('log-out');
  const d=document.createElement('div');
  d.className='log-line '+cls;d.textContent=text;
  lo.appendChild(d);lo.scrollTop=lo.scrollHeight;
  if(lo.children.length>600)lo.removeChild(lo.firstChild);
}

function showAlert(name,side,sz,px){
  const isBuy=side==='B';
  const ab=document.getElementById('alert-bar');
  ab.className='alert-bar show '+(isBuy?'buy':'sell');
  ab.textContent='⚡ TWAP '+(isBuy?'▲ BUY':'▼ SELL')+'  '+name+'  |  sz: '+fmt(sz)+'  |  px: $'+parseFloat(px).toFixed(6)+'  |  '+ts();
  if(alT)clearTimeout(alT);
  alT=setTimeout(()=>ab.classList.remove('show'),8000);
}

function isTWAP(t){
  if(!t||!t.hash||t.hash!==ZERO_HASH)return false;
  const isBuy=t.side==='B';
  const wallet=(isBuy?(t.users||[])[0]:(t.users||[])[1])||'';
  // Filter dummy wallet 0xeeee...eeee (Spot Dust Conversion)
  if(!wallet||wallet==='0x'+'e'.repeat(40))return false;
  // Log wallet untuk debug (bisa dihapus nanti)
  const name=COINS[t.coin]||t.coin;
  console.log('TWAP detected:',name,t.side,'wallet:',wallet,'hash:',t.hash);
  return true;
}

function processTrade(t){
  if(!t||!t.coin||!active.has(t.coin))return;
  // Abaikan trade yang lebih dari 5 menit yang lalu (snapshot lama saat reconnect)
  if(t.time&&Date.now()-t.time>5*60*1000)return;
  // Dedup berdasarkan tid
  const tid=String(t.tid||'')+t.coin+t.side;
  if(tid&&seenTids.has(tid))return;
  if(tid)seenTids.add(tid);
  if(seenTids.size>3000)seenTids.clear();
  if(!isTWAP(t))return;

  const name=COINS[t.coin]||t.coin;
  const isBuy=t.side==='B';
  const wallet=(isBuy?(t.users||[])[0]:(t.users||[])[1])||'unknown';
  const key=wallet+'_'+t.coin+'_'+t.side;
  const now=Date.now();
  const sz=parseFloat(t.sz);

  if(!twapGroups[key]){
    twapGroups[key]={wallet,coin:t.coin,side:t.side,count:0,totalSz:0,avgSz:0,
      lastPx:t.px,firstTime:now,lastTime:now,intervals:[],prevTime:now};
  }
  const g=twapGroups[key];
  if(g.count>0)g.intervals.push(now-g.prevTime);
  g.prevTime=now;g.count++;g.totalSz+=sz;g.avgSz=g.totalSz/g.count;
  g.lastPx=t.px;g.lastTime=now;

  twapC++;if(isBuy)buyC++;else sellC++;
  document.getElementById('bs-twap').textContent=twapC;
  document.getElementById('bs-buy').textContent=buyC;
  document.getElementById('bs-sell').textContent=sellC;

  log('['+ts()+'] ⚡ TWAP '+(isBuy?'▲ BUY ':'▼ SELL')+'  '+name.padEnd(8)+'  sz: '+fmt(sz).padStart(12)+'  px: $'+parseFloat(t.px).toFixed(6),(isBuy?'buy':'sell'));
  showAlert(name,t.side,sz,t.px);
  // Fetch data blockchain — force refresh setiap slice baru untuk akurasi
  enrichTwapGroup(key,twapGroups[key],true);
  switchTab('twap');
  renderTWAP();
}

// Cache twapHistory per wallet
const twapHistoryCache={};

async function fetchTwapHistory(wallet, forceRefresh=false){
  const cached=twapHistoryCache[wallet];
  // Cache 5 detik untuk TWAP aktif, 60 detik untuk yang sudah selesai
  const ttl=cached&&cached.hasActive?5000:60000;
  if(!forceRefresh&&cached&&Date.now()-cached.fetchTime<ttl){
    return cached.data;
  }
  try{
    const r=await fetch('https://api.hyperliquid.xyz/info',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'twapHistory',user:wallet})
    });
    const data=await r.json();
    // Cek apakah ada TWAP aktif
    const hasActive=Array.isArray(data)&&data.some(d=>d.status?.status==='activated');
    twapHistoryCache[wallet]={data,fetchTime:Date.now(),hasActive};
    return data;
  }catch(e){return null;}
}

// Map coin HL ke token index untuk matching di twapHistory
const COIN_TO_TOKEN={
  'PURR/USDC':'PURR/USDC','@107':'@107','@334':'@334',
  '@1':'@1','@59':'@59','@240':'@240','@130':'@130',
  '@160':'@160','@242':'@242','@85':'@85','@5':'@5',
  '@184':'@184','@188':'@188','@261':'@261','@162':'@162',
  '@335':'@335','@206':'@206','@284':'@284'
};

async function enrichTwapGroup(key,g,forceRefresh=false){
  try{
    const history=await fetchTwapHistory(g.wallet,forceRefresh);
    if(!history||!history.length)return;

    // Prioritas: cari yang status=activated dulu, kalau tidak ada ambil paling baru
    const candidates=history
      .filter(h=>h.state&&h.state.coin===g.coin&&h.state.side===g.side);
    if(!candidates.length)return;

    const activated=candidates.find(h=>h.status?.status==='activated');
    const match=activated||candidates.sort((a,b)=>b.state.timestamp-a.state.timestamp)[0];
    if(!match)return;

    const state=match.state;
    const startMs=state.timestamp;
    const durationMs=state.minutes*60*1000;
    const endMs=startMs+durationMs;
    const totalPlanned=parseFloat(state.sz);
    // executedSz dari blockchain, fallback ke WebSocket totalSz
    const executed=parseFloat(state.executedSz)||0;
    const executedNtl=parseFloat(state.executedNtl)||0;
    const pct=totalPlanned>0?(executed/totalPlanned*100):0;
    const isActive=match.status?.status==='activated';

    if(twapGroups[key]){
      twapGroups[key]={
        ...twapGroups[key],
        plannedSz:totalPlanned,
        executedSz:executed,
        executedNtl,
        pctDone:pct,
        startMs,
        endMs,
        durationMs,
        minutes:state.minutes,
        status:match.status?.status||'unknown',
        twapId:match.twapId,
        isActiveOnChain:isActive,
      };
    }
  }catch(e){console.error('enrichTwapGroup:',e);}
}


function renderTWAP(){
  const el=document.getElementById('twap-content');
  const now=Date.now();
  const all=Object.values(twapGroups).map(g=>{
    const avgInt=g.intervals.length?g.intervals.reduce((a,b)=>a+b,0)/g.intervals.length:30000;
    return{...g,isActive:now-g.lastTime<Math.max(avgInt*2,60000)};
  }).sort((a,b)=>{
    // Sort: aktif dulu, lalu per coin name, lalu BUY sebelum SELL
    if(a.isActive!==b.isActive)return b.isActive-a.isActive;
    const na=COINS[a.coin]||a.coin, nb=COINS[b.coin]||b.coin;
    if(na!==nb)return na.localeCompare(nb);
    return a.side==='B'?-1:1;
  });
  if(!all.length){
    el.innerHTML='<div class="empty-state"><div style="font-size:28px">🔍</div><div>Tidak ada TWAP terdeteksi</div><div style="font-size:10px">Disconnect berkala adalah normal — reconnect otomatis</div></div>';
    return;
  }
  el.innerHTML='<div class="twap-grid">'+all.map(g=>{
    const isBuy=g.side==='B';
    const col=isBuy?'#26a69a':'#ff2255';
    const name=COINS[g.coin]||g.coin;
    const avgPx=parseFloat(g.lastPx);
    const shortW=g.wallet.slice(0,6)+'...'+g.wallet.slice(-4);
    const avgInt=g.intervals.length?g.intervals.reduce((a,b)=>a+b,0)/g.intervals.length:30000;

    let progPct=0,remainStr='',pctStr='',execStr='',planStr='',totalStr='',durationStr='';

    if(g.endMs){
      const remainMs=Math.max(0,g.endMs-now);
      const elapsed=now-g.startMs;
      progPct=Math.min(100,elapsed/g.durationMs*100);
      remainStr=fmtCountdown(remainMs);
      pctStr=(g.pctDone||0).toFixed(1)+'%';
      const displayExec=g.executedSz>0?g.executedSz:g.totalSz;
      const displayNtl=g.executedNtl>0?g.executedNtl:(g.totalSz*avgPx);
      execStr=fmt(displayExec)+' '+name;
      planStr=fmt(g.plannedSz||g.totalSz)+' '+name;
      const totalNtl=parseFloat(g.plannedSz||g.totalSz)*avgPx;
      totalStr='$'+fmtU(totalNtl);
      durationStr=g.minutes+'m total';
    } else {
      const durMs=now-g.firstTime;
      progPct=Math.min(100,durMs/3600000*100);
      const durMin=Math.floor(durMs/60000);
      const durSec=Math.floor((durMs%60000)/1000);
      remainStr='~'+(durMin>0?durMin+'m ':'')+durSec+'s';
      pctStr='fetching...';
      execStr=fmt(g.totalSz)+' '+name;
      planStr='—';
      totalStr='$'+fmtU(g.totalSz*avgPx);
      durationStr='';
    }

    return'<div class="twap-card '+(isBuy?'buy':'sell')+(g.isActive?'':' inactive')+'">'
      // Header: side + coin + status
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        +'<div style="display:flex;align-items:center;gap:6px">'
          +'<div class="side-dot '+(isBuy?'buy':'sell')+'" style="'+(g.isActive?'box-shadow:0 0 5px '+col:'')+'"></div>'
          +'<span class="side-label '+(isBuy?'buy':'sell')+'" style="font-size:13px">'+(isBuy?'BUY':'SELL')+'</span>'
          +'<span style="font-size:11px;color:var(--text2);font-weight:600">'+name+'</span>'
        +'</div>'
        +'<span style="font-size:9px;color:'+(g.isActive?'#f59e0b':'var(--text3)')+'">'+(g.isActive?'● Aktif':'○ Selesai')+'</span>'
      +'</div>'
      // Wallet
      +'<a href="https://hypurrscan.io/address/'+g.wallet+'#spot" target="_blank" style="font-size:10px;color:var(--text3);text-decoration:none;display:block;margin-bottom:7px">'+shortW+' ↗</a>'
      // Info row: exec/plan, countdown, slices
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:7px">'
        +'<div style="font-size:9px;color:var(--text3)">Executed<div style="font-size:11px;color:#00ffaa;margin-top:1px">'+execStr+'</div></div>'
        +'<div style="font-size:9px;color:var(--text3)">Planned<div style="font-size:11px;color:var(--text);margin-top:1px">'+planStr+'</div></div>'
        +'<div style="font-size:9px;color:var(--text3)">Total Value<div style="font-size:11px;color:#00ffaa;margin-top:1px">'+totalStr+'</div></div>'
        +'<div style="font-size:9px;color:var(--text3)">Last Px<div style="font-size:11px;color:'+(isBuy?'#26a69a':'#ff2255')+';margin-top:1px">$'+avgPx.toFixed(5)+'</div></div>'
        +'<div style="font-size:9px;color:var(--text3)">Slices<div style="font-size:11px;color:var(--text);margin-top:1px">'+g.count+'x ~'+Math.round(avgInt/1000)+'s</div></div>'
        +'<div style="font-size:9px;color:var(--text3)">'+(g.endMs?'Sisa':'Durasi')+'<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:1px">'+remainStr+'</div></div>'
      +'</div>'
      // Progress bar
      +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:3px">'
        +'<span>'+pctStr+'</span><span>'+durationStr+'</span>'
      +'</div>'
      +'<div class="prog-wrap"><div class="prog-fill '+(isBuy?'':'sell')+'" style="width:'+progPct.toFixed(1)+'%;transition:width 1s linear"></div></div>'
      +'</div>';
  }).join('')+'</div>';
}
setInterval(renderTWAP,1000);

// WebSocket manager
let ws1=null,ws2=null,alive1=false,alive2=false;
let r1={v:0},r2={v:0},p1={v:null},p2={v:null};

function updateStatus(){
  const el=document.getElementById('bs-conn');
  const n=[alive1,alive2].filter(Boolean).length;
  if(n===2){el.textContent='● connected (2/2 WS)';el.style.color='#26a69a';}
  else if(n===1){el.textContent='● partial (1/2 WS)';el.style.color='#f59e0b';}
  else{el.textContent='● reconnecting...';el.style.color='var(--text3)';}
}
function updateMonitor(){document.getElementById('bs-mon').textContent=active.size;}

function makeWS(id,coins,badgeId,rr,pr){
  const badge=document.getElementById(badgeId);
  function conn(){
    const ws=new WebSocket('wss://api.hyperliquid.xyz/ws');
    if(id===1)ws1=ws;else ws2=ws;
    ws.onopen=()=>{
      rr.v=0;
      if(id===1)alive1=true;else alive2=true;
      badge.textContent='WS'+id+' live';badge.classList.add('live');
      updateStatus();
      const subs=coins.filter(c=>active.has(c));
      log('['+ts()+'] WS'+id+' connected — subscribing '+subs.length+' coin','info');
      subs.forEach((c,i)=>setTimeout(()=>{
        if(ws.readyState===1)ws.send(JSON.stringify({method:'subscribe',subscription:{type:'trades',coin:c}}));
      },i*500));
      // Ping setiap 20 detik untuk jaga koneksi
      if(pr.v)clearInterval(pr.v);
      pr.v=setInterval(()=>{if(ws.readyState===1)ws.send(JSON.stringify({method:'ping'}));},20000);
    };
    ws.onmessage=(e)=>{
      try{
        const d=JSON.parse(e.data);
        if(d.channel==='trades'&&d.data){
          const t=Array.isArray(d.data)?d.data:[d.data];
          t.forEach(processTrade);
        }
      }catch(e){}
    };
    ws.onerror=()=>log('['+ts()+'] WS'+id+' error','err');
    ws.onclose=()=>{
      if(id===1)alive1=false;else alive2=false;
      badge.textContent='WS'+id+' off';badge.classList.remove('live');
      updateStatus();
      if(pr.v){clearInterval(pr.v);pr.v=null;}
      // Reconnect — server disconnect adalah normal sesuai docs HL
      rr.v++;
      const delay=Math.min(2000*rr.v,10000);
      setTimeout(conn,delay);
    };
  }
  conn();
}

// Start WS1 langsung, WS2 setelah 8 detik
setTimeout(()=>makeWS(1,G1,'ws1-badge',r1,p1),500);
setTimeout(()=>makeWS(2,G2,'ws2-badge',r2,p2),8000);

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-t="'+t+'"]').classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.t)));
document.querySelectorAll('.cbtn').forEach(b=>b.addEventListener('click',()=>b.classList.toggle('on')));
document.getElementById('fa-all').addEventListener('click',()=>document.querySelectorAll('.cbtn').forEach(b=>b.classList.add('on')));
document.getElementById('fa-none').addEventListener('click',()=>document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on')));
document.getElementById('fa-apply').addEventListener('click',()=>{
  const nw=new Set();
  document.querySelectorAll('.cbtn.on').forEach(b=>nw.add(b.dataset.coin));

  // Unsubscribe coin yang dimatikan
  const removed=[...active].filter(c=>!nw.has(c));
  const added=[...nw].filter(c=>!active.has(c));

  removed.forEach(c=>{
    const name=COINS[c]||c;
    [ws1,ws2].forEach(ws=>{
      if(ws&&ws.readyState===1){
        ws.send(JSON.stringify({method:'unsubscribe',subscription:{type:'trades',coin:c}}));
      }
    });
    log('['+ts()+'] Stop monitor: '+name,'warn');
  });

  // Subscribe coin baru
  added.forEach((c,i)=>{
    const name=COINS[c]||c;
    // Subscribe ke WS1 atau WS2 tergantung grup
    const ws=G1.includes(c)?ws1:ws2;
    setTimeout(()=>{
      if(ws&&ws.readyState===1){
        ws.send(JSON.stringify({method:'subscribe',subscription:{type:'trades',coin:c}}));
        log('['+ts()+'] Mulai monitor: '+name,'info');
      }
    },i*300);
  });

  active=nw;
  updateMonitor();

  // Hapus twapGroups untuk coin yang dimatikan supaya tidak tampil lagi
  removed.forEach(c=>{
    Object.keys(twapGroups).forEach(k=>{
      if(twapGroups[k].coin===c)delete twapGroups[k];
    });
  });

  log('['+ts()+'] Filter diterapkan — '+active.size+' coin aktif','info');
  renderTWAP();
  switchTab('twap');
});
document.getElementById('bclear').addEventListener('click',()=>{
  document.getElementById('log-out').innerHTML='';
  log('['+ts()+'] Log dibersihkan','sys');
});
updateMonitor();
</script>
